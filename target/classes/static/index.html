<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.12);
            width: 500px;
            padding: 24px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 1.4rem; }
        #status { text-align: center; font-size: 0.8rem; margin-bottom: 16px; color: #888; }
        #status.connected { color: #28a745; }
        #status.error { color: #dc3545; }
        #chat-messages {
            border: 1px solid #ddd;
            border-radius: 8px;
            height: 320px;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 16px;
            background: #fafafa;
        }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; }
        .message .sender { font-weight: bold; font-size: 0.8rem; color: #555; margin-bottom: 2px; }
        .message .text { color: #333; }
        #message-form { display: flex; gap: 8px; }
        input[type="text"] {
            padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 0.95rem; outline: none; transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: #4a90e2; }
        #sender-input { width: 120px; flex-shrink: 0; }
        #message-input { flex-grow: 1; }
        button {
            padding: 10px 18px; background: #4a90e2; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem;
        }
        button:hover { background: #357abd; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .room-row { display: flex; gap: 8px; margin-bottom: 12px; }
        #room-input { flex-grow: 1; }
        #join-btn { background: #28a745; }
        #join-btn:hover { background: #1e7e34; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>💬 Quick Chat</h1>
        <div id="status">Connecting...</div>
        <div class="room-row">
            <input type="text" id="room-input" placeholder="Room ID (e.g. general)" value="general">
            <button id="join-btn" onclick="joinRoom()">Join Room</button>
        </div>
        <div id="chat-messages"></div>
        <form id="message-form">
            <input type="text" id="sender-input" placeholder="Your Name" required>
            <input type="text" id="message-input" placeholder="Type a message..." required>
            <button type="submit" id="send-btn" disabled>Send</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageForm = document.getElementById('message-form');
        const senderInput = document.getElementById('sender-input');
        const messageInput = document.getElementById('message-input');
        const statusEl = document.getElementById('status');
        const sendBtn = document.getElementById('send-btn');

        let stompClient = null;
        let currentRoom = null;
        let currentSubscription = null;

        // Dynamically use current host — works on any machine
        const wsUrl = window.location.origin + '/ws-chat';
        const socket = new SockJS(wsUrl);
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            statusEl.textContent = '● Connected';
            statusEl.className = 'connected';
            sendBtn.disabled = false;
            joinRoom();
        }, function (error) {
            statusEl.textContent = '✗ Connection failed — is the server running?';
            statusEl.className = 'error';
        });

        function joinRoom() {
            const roomId = document.getElementById('room-input').value.trim() || 'general';
            if (currentSubscription) currentSubscription.unsubscribe();
            currentRoom = roomId;
            currentSubscription = stompClient.subscribe('/topic/' + roomId + '/messages', function (message) {
                displayMessage(JSON.parse(message.body));
            });
            addSystemMessage('Joined room: ' + roomId);
        }

        function sendMessage(event) {
            event.preventDefault();
            if (!stompClient || !currentRoom) return;
            const message = {
                sender: senderInput.value.trim() || 'Anonymous',
                content: messageInput.value.trim(),
                recipient: currentRoom
            };
            stompClient.send('/app/' + currentRoom + '/sendMessage', {}, JSON.stringify(message));
            messageInput.value = '';
        }

        function displayMessage(message) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = '<div class="sender">' + escapeHtml(message.sender) + '</div>' +
                            '<div class="text">' + escapeHtml(message.content) + '</div>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.style.cssText = 'text-align:center;color:#888;font-size:0.8rem;margin:8px 0;';
            div.textContent = '— ' + text + ' —';
            chatMessages.appendChild(div);
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        messageForm.addEventListener('submit', sendMessage);
    </script>
</body>
</html>
